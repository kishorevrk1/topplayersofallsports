# ===============================
# PRODUCTION DATABASE CONFIGURATION
# ===============================
# PostgreSQL Production Database
spring.datasource.url=jdbc:postgresql://localhost:5432/topplayersofallsports
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration for Production
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.use_sql_comments=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Connection Pool Configuration
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.leak-detection-threshold=60000

# ===============================
# SECURITY CONFIGURATION
# ===============================
jwt.secret=${JWT_SECRET:myProductionSecretKey123456789012345678901234567890}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===============================
# AI SERVICE CONFIGURATION
# ===============================
app.ai.gemini.api-key=${GEMINI_API_KEY:AIzaSyB23rbdM6jvoVfEmSFT0dcxeCd49vYEau8}
app.ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
app.ai.gemini.model=gemini-pro
app.ai.daily-limit=1500

# ===============================
# SPORTS API CONFIGURATION
# ===============================
app.sports.api-football.api-key=${API_FOOTBALL_KEY:66c1aa5377826c5b828acae837d61f99}
app.sports.api-football.base-url=https://v3.football.api-sports.io
app.sports.api-football.daily-limit=100
app.sports.api-football.host=v3.football.api-sports.io

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=${PORT:8080}
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# ===============================
# LOGGING CONFIGURATION
# ===============================
logging.level.com.topplayersofallsports.backend=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ===============================
# CACHE CONFIGURATION
# ===============================
spring.cache.type=redis
spring.cache.redis.host=${REDIS_HOST:localhost}
spring.cache.redis.port=${REDIS_PORT:6379}
spring.cache.redis.password=${REDIS_PASSWORD:}
cache.ttl.news=300000
cache.ttl.players=600000
cache.ttl.videos=300000

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

file.upload.dir=${UPLOAD_DIR:./uploads/}
file.upload.allowed-types=image/jpeg,image/png,image/gif,video/mp4,video/mpeg

# ===============================
# CORS CONFIGURATION
# ===============================
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:5173,https://yourdomain.com}
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ===============================
# ACTUATOR CONFIGURATION
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ===============================
# API DOCUMENTATION
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.topplayersofallsports.backend.controller

# ===============================
# SPORTS DATA CONFIGURATION
# ===============================
sports.data.refresh-interval=3600000
sports.data.cache-duration=1800000
sports.trending.update-interval=300000

# ===============================
# PERFORMANCE TUNING
# ===============================
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=true
spring.jpa.properties.hibernate.query.fail_on_pagination_over_collection_fetch=true
spring.jpa.properties.hibernate.query.in_clause_parameter_padding=true
