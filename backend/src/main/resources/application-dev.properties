# ===============================
# DEVELOPMENT CONFIGURATION
# ===============================

# ===============================
# DATABASE CONFIGURATION (DEV)
# ===============================
# PostgreSQL Database for development
spring.datasource.url=jdbc:postgresql://localhost:5432/topplayersofallsports
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool Configuration (smaller for dev)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# JPA/HIBERNATE CONFIGURATION (DEV)
# ===============================
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false

# ===============================
# LIQUIBASE CONFIGURATION (DEV)
# ===============================
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true
spring.liquibase.drop-first=false
spring.liquibase.contexts=dev
spring.liquibase.default-schema=public

# ===============================
# LOGGING CONFIGURATION (DEV)
# ===============================
logging.level.com.topplayersofallsports.backend=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.liquibase=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ===============================
# CACHE CONFIGURATION (DEV)
# ===============================
spring.cache.type=simple

# ===============================
# SECURITY CONFIGURATION (DEV)
# ===============================
jwt.secret=${JWT_SECRET:myDevelopmentSecretKey123456789012345678901234567890abcdef}
jwt.expiration=86400000
jwt.refresh-expiration=604800000

# ===============================
# AI SERVICE CONFIGURATION (DEV)
# ===============================
app.ai.gemini.api-key=${GEMINI_API_KEY:AIzaSyB23rbdM6jvoVfEmSFT0dcxeCd49vYEau8}
app.ai.gemini.base-url=https://generativelanguage.googleapis.com/v1beta
app.ai.gemini.model=gemini-pro
app.ai.daily-limit=1500

# ===============================
# SPORTS API CONFIGURATION (DEV)
# ===============================
app.sports.api-football.api-key=${API_FOOTBALL_KEY:66c1aa5377826c5b828acae837d61f99}
app.sports.api-football.base-url=https://v3.football.api-sports.io
app.sports.api-football.daily-limit=100
app.sports.api-football.host=v3.football.api-sports.io

# ===============================
# CORS CONFIGURATION (DEV)
# ===============================
cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:8080
cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
cors.allowed-headers=*
cors.allow-credentials=true

# ===============================
# ACTUATOR CONFIGURATION (DEV)
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,env,beans
management.endpoint.health.show-details=always

# ===============================
# API DOCUMENTATION (DEV)
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.packages-to-scan=com.topplayersofallsports.backend.controller
