# ===============================
# APPLICATION CONFIGURATION
# ===============================
spring.application.name=topplayersofallsports-backend
server.port=8080

# ===============================
# ACTIVE PROFILE
# ===============================
spring.profiles.active=dev

# ===============================
# FILE UPLOAD CONFIGURATION
# ===============================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

file.upload.dir=./uploads/
file.upload.allowed-types=image/jpeg,image/png,image/gif,video/mp4,video/mpeg

# ===============================
# EMAIL CONFIGURATION
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${EMAIL_PASSWORD:your-email-password}
spring.mail.properties.mail.smtp.auth.true
spring.mail.properties.mail.smtp.starttls.enable=true

# ===============================
# SPORTS DATA CONFIGURATION
# ===============================
sports.data.refresh-interval=3600000
sports.data.cache-duration=1800000
sports.trending.update-interval=300000

# ===============================
# OAUTH2 CONFIGURATION
# ===============================
# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:882439388803-8qdpntj38midjvlmcprku4b82lp125j3.apps.googleusercontent.com}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET: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}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# OAuth2 Provider Configuration
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v2/userinfo
spring.security.oauth2.client.provider.google.jwk-set-uri=https://www.googleapis.com/oauth2/v3/certs

# Application OAuth2 Configuration
app.oauth2.google.clientId=${GOOGLE_CLIENT_ID:882439388803-8qdpntj38midjvlmcprku4b82lp125j3.apps.googleusercontent.com}
app.frontend.baseUrl=${FRONTEND_BASE_URL:http://localhost:3000}
