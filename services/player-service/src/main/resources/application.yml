server:
  port: 8084
  servlet:
    context-path: /

spring:
  application:
    name: player-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/topplayersofallsports
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  cache:
    type: redis
    redis:
      time-to-live: 604800000 # 7 days

# AI Provider Configuration
# Currently: Groq (OpenAI-compatible, free tier, no Venice throttling)
# To switch to Gemini: base-url: https://generativelanguage.googleapis.com/v1beta/openai
#                      model: gemini-2.0-flash  |  secondary-model: gemini-1.5-flash
#                      (1,000,000 TPM free — virtually unlimited)
openrouter:
  api-key: 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
  base-url: https://openrouter.ai/api/v1
  model: anthropic/claude-3-5-haiku-20241022    # Claude Haiku via BYOK — routes to Anthropic directly, no Venice
  secondary-model: anthropic/claude-3-haiku-20240307
  site-url: https://topplayersofallsports.com
  site-name: TopPlayersOfAllSports
  timeout-seconds: 120
  max-tokens: 4096

# Anthropic Direct API (used by Top100SeedingService — no OpenRouter proxy)
anthropic:
  api-key: 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
  model: claude-3-5-haiku-20241022    # Fast, cheap, excellent JSON generation
  max-tokens: 4096
  timeout-seconds: 120

# API-Sports Configuration - Football stats as AI prompt context
apisports:
  football:
    key: 85d68b544dc24999df5e7a90cb8933bd
    base-url: https://v3.football.api-sports.io
    timeout-seconds: 30

# Player Sync Configuration
player:
  sync:
    enabled: true
    cron: "0 0 2 * * SUN"  # Every Sunday at 2 AM
    players-per-sport: 50
    sports:
      - FOOTBALL
      - BASKETBALL
      - MMA
      - CRICKET
      - TENNIS
    leagues:
      football:
        - 39   # Premier League
        - 140  # La Liga
        - 78   # Bundesliga
        - 135  # Serie A
        - 61   # Ligue 1
      basketball:
        - 12   # NBA
      mma:
        - 1    # UFC
      cricket:
        - 1    # IPL
      tennis:
        - 1    # ATP

# AI Analysis Configuration
ai:
  analysis:
    rating:
      peak-performance-weight: 0.30
      longevity-weight: 0.20
      awards-weight: 0.20
      era-adjusted-weight: 0.30
    prompt:
      temperature: 0.3   # Lower temperature for factual accuracy in consensus mode
      max-retries: 3
    consensus:
      stale-days: 7      # Re-evaluate ratings older than 7 days
      high-confidence-threshold: 3.0   # Max divergence for HIGH confidence
      medium-confidence-threshold: 6.0 # Max divergence for MEDIUM confidence

# Logging
logging:
  level:
    root: INFO
    com.topplayersofallsports: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# Temporal Workflow Configuration
temporal:
  enabled: true             # Enable Temporal workflows
  connection:
    target: localhost:7233  # Temporal server address
  namespace: default        # Temporal namespace
  worker:
    task-queue: player-registration
    max-concurrent-activities: 10
    max-concurrent-workflows: 5

# Top 50 Ranking System Configuration
ranking:
  auto-initialize: false  # Automatically initialize all sports on startup (set to false for manual control)
  auto-initialize-delay-seconds: 30  # Delay before starting auto-initialization

# ── Google OAuth2 ──────────────────────────────────────────
google:
  oauth2:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    token-url: https://oauth2.googleapis.com/token
    user-info-url: https://www.googleapis.com/oauth2/v1/userinfo

# ── JWT ────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}
  access-token-expiry-ms: 900000
  refresh-token-expiry-ms: 604800000
