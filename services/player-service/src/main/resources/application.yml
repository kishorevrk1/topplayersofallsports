server:
  port: 8084
  servlet:
    context-path: /

spring:
  application:
    name: player-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/topplayersofallsports
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  cache:
    type: redis
    redis:
      time-to-live: 604800000 # 7 days

# OpenRouter AI Configuration
openrouter:
  api-key: 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
  base-url: https://openrouter.ai/api/v1
  model: tngtech/deepseek-r1t-chimera:free  # Free tier model
  site-url: https://topplayersofallsports.com
  site-name: TopPlayersOfAllSports
  timeout-seconds: 60
  max-tokens: 4000

# API-Sports Configuration - REMOVED (AI-ONLY APPROACH)
# apisports:
