spring:
  application:
    name: calendar-service
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:calendar_service}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        jakarta:
          persistence:
            schema-generation:
              database:
                action: none
              scripts:
                action: none
  
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
  
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour

server:
  port: ${SERVER_PORT:8083}
  servlet:
    context-path: /
  error:
    include-message: always
    include-binding-errors: always

# API-Sports.io Configuration
api-sports:
  base-url: https://v3.football.api-sports.io
  api-key: ${API_SPORTS_KEY:APISPORTS_KEY_REMOVED}
  rate-limit:
    requests-per-day: 100
    requests-per-minute: 10
  
  # Free Plan Strategy: Live-First Experience
  # - Live matches only (updated every 15s)
  # - Batch all leagues in single API call
  # - ~60 calls/day for live updates during peak hours (6 AM - 12 AM)
  # - No historical data, no future schedule beyond today
  
  # Football Leagues (API-Sports Football)
  football:
    leagues:
      - id: 39
        name: "Premier League"
        country: "England"
        season: 2024
        priority: 1
      - id: 140
        name: "La Liga"
        country: "Spain"
        season: 2024
        priority: 2
      - id: 1
        name: "World Cup"
        country: "World"
        season: 2026
        priority: 3
      - id: 2
        name: "UEFA Champions League"
        country: "Europe"
        season: 2024
        priority: 4
  
  # Basketball Leagues (API-Sports Basketball)
  basketball:
    api-url: https://v1.basketball.api-sports.io
    leagues:
      - id: 12
        name: "NBA"
        country: "USA"
        season: "2024-2025"
        priority: 1
      - id: 4
        name: "FIBA World Cup"
        country: "World"
        season: "2023"
        priority: 2

# Temporal Configuration
temporal:
  connection:
    target: ${TEMPORAL_HOST:localhost}:${TEMPORAL_PORT:7233}
  namespace: ${TEMPORAL_NAMESPACE:default}
  task-queue: calendar-service-tasks
  
  workflows:
    sync-schedule: "0 0 2 * * ?" # Daily at 2 AM
    live-update-interval: 15 # seconds

# Management & Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

# Logging
logging:
  level:
    root: INFO
    com.topplayers.calendar: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
    io.temporal: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %msg%n"

# Application-Specific Configuration
app:
  sync:
    days-ahead: 7
    enabled: true
  cache:
    ttl:
      fixtures: 3600 # 1 hour
      live-fixtures: 15 # 15 seconds
      leagues: 86400 # 24 hours
