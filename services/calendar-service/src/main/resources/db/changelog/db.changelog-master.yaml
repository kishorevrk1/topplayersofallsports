databaseChangeLog:
  - changeSet:
      id: 1-create-fixtures-table
      author: calendar-service
      preConditions:
        - onFail: MARK_RAN
        - not:
            - tableExists:
                tableName: fixtures
      changes:
        - createTable:
            tableName: fixtures
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  constraints:
                    primaryKey: true
                    nullable: false
              
              - column:
                  name: external_id
                  type: BIGINT
                  constraints:
                    nullable: false
              
              # Sport Type
              - column:
                  name: sport
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              
              # League/Competition Information
              - column:
                  name: league_id
                  type: INTEGER
                  constraints:
                    nullable: false
              
              - column:
                  name: league_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              
              - column:
                  name: league_country
                  type: VARCHAR(100)
              
              - column:
                  name: league_logo
                  type: VARCHAR(500)
              
              - column:
                  name: season
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              
              - column:
                  name: round
                  type: VARCHAR(100)
              
              # Date and Time
              - column:
                  name: fixture_date
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              
              - column:
                  name: timezone
                  type: VARCHAR(50)
              
              - column:
                  name: venue
                  type: VARCHAR(255)
              
              - column:
                  name: venue_city
                  type: VARCHAR(100)
              
              # Teams
              - column:
                  name: home_team_id
                  type: INTEGER
                  constraints:
                    nullable: false
              
              - column:
                  name: home_team_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              
              - column:
                  name: home_team_logo
                  type: VARCHAR(500)
              
              - column:
                  name: away_team_id
                  type: INTEGER
                  constraints:
                    nullable: false
              
              - column:
                  name: away_team_name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              
              - column:
                  name: away_team_logo
                  type: VARCHAR(500)
              
              # Status
              - column:
                  name: status
                  type: VARCHAR(10)
                  constraints:
                    nullable: false
              
              - column:
                  name: status_long
                  type: VARCHAR(100)
              
              - column:
                  name: elapsed_time
                  type: INTEGER
              
              - column:
                  name: is_live
                  type: BOOLEAN
              
              # Scores
              - column:
                  name: home_score
                  type: INTEGER
              
              - column:
                  name: away_score
                  type: INTEGER
              
              - column:
                  name: score_details
                  type: TEXT
              
              # Additional Info
              - column:
                  name: referee
                  type: VARCHAR(255)
              
              # Metadata
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        
        - createIndex:
            indexName: idx_fixture_date
            tableName: fixtures
            columns:
              - column:
                  name: fixture_date
        
        - createIndex:
            indexName: idx_sport_date
            tableName: fixtures
            columns:
              - column:
                  name: sport
              - column:
                  name: fixture_date
        
        - createIndex:
            indexName: idx_league_season
            tableName: fixtures
            columns:
              - column:
                  name: league_id
              - column:
                  name: season
        
        - createIndex:
            indexName: idx_status
            tableName: fixtures
            columns:
              - column:
                  name: status
        
        - createIndex:
            indexName: idx_is_live
            tableName: fixtures
            columns:
              - column:
                  name: is_live
        
        - createIndex:
            indexName: idx_sport
            tableName: fixtures
            columns:
              - column:
                  name: sport
        
        - addUniqueConstraint:
            tableName: fixtures
            columnNames: external_id, sport
            constraintName: uk_external_id_sport
