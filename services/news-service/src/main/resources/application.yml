server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: news-service
  
  datasource:
    url: jdbc:postgresql://localhost:5433/topplayersofallsports
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
  
  data:
    redis:
      host: localhost
      port: 6379
      timeout: 60000
      jedis:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  
  cache:
    type: redis
    redis:
      time-to-live: 3600000 # 1 hour

# NewsAPI Configuration
newsapi:
  api-key: ab34ae67855f4986a707bd9dea463055
  base-url: https://newsapi.org/v2
  articles-per-sport: 20
  update-interval-hours: 6

# Temporal Configuration
temporal:
  host: localhost
  port: 7233
  namespace: default
  task-queue: news-task-queue

# News Ingestion Schedule
news:
  ingest:
    enabled: true
    cron: "0 0 */6 * * *"  # Every 6 hours
    sports:
      - BASKETBALL
      - FOOTBALL
      - SOCCER
      - HOCKEY
      - TENNIS
      - MMA
      - BASEBALL
      - GOLF

# Logging
logging:
  level:
    root: INFO
    com.topplayersofallsports: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    io.temporal: INFO

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

# Swagger/OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
